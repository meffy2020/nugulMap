services:
  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required in production}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required in production}

  minio-init:
    entrypoint:
      - /bin/sh
      - -ec
      - |
        test "$${MINIO_ROOT_USER}" != "$${AWS_ACCESS_KEY_ID}" || {
          echo "MINIO_ROOT_USER must differ from AWS_ACCESS_KEY_ID" >&2
          exit 1
        }
        test "$${MINIO_ROOT_PASSWORD}" != "$${AWS_SECRET_ACCESS_KEY}" || {
          echo "MINIO_ROOT_PASSWORD must differ from AWS_SECRET_ACCESS_KEY" >&2
          exit 1
        }
        case "$${AWS_S3_BUCKET}" in
          ""|*[!a-z0-9.-]*)
            echo "AWS_S3_BUCKET must be a lowercase S3 bucket name" >&2
            exit 1
            ;;
        esac
        /usr/bin/mc alias set myminio http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        /usr/bin/mc mb --ignore-existing "myminio/$${AWS_S3_BUCKET}"
        /usr/bin/mc anonymous set none "myminio/$${AWS_S3_BUCKET}"
        sed "s|__NUGULMAP_BUCKET__|$${AWS_S3_BUCKET}|g" \
          /config/nugulmap-app-policy.json > /tmp/nugulmap-app-policy.json
        /usr/bin/mc admin user add myminio "$${AWS_ACCESS_KEY_ID}" "$${AWS_SECRET_ACCESS_KEY}"
        /usr/bin/mc admin policy create myminio nugulmap-app /tmp/nugulmap-app-policy.json
        /usr/bin/mc admin policy attach myminio nugulmap-app --user "$${AWS_ACCESS_KEY_ID}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required in production}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required in production}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required in production}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required in production}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:?AWS_S3_BUCKET is required in production}
    volumes:
      - ./backend/api-server/minio/nugulmap-app-policy.json:/config/nugulmap-app-policy.json:ro

  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required in production}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required in production}
      MYSQL_USER: ${MYSQL_USERNAME:?MYSQL_USERNAME is required in production}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in production}

  mysql-app-init:
    image: mysql:8.0
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        test "$${MYSQL_ROOT_PASSWORD}" != "$${MYSQL_PASSWORD}" || {
          echo "MYSQL_ROOT_PASSWORD must differ from MYSQL_PASSWORD" >&2
          exit 1
        }
        case "$${MYSQL_DATABASE}" in
          ""|*[!A-Za-z0-9_]*)
            echo "MYSQL_DATABASE must contain only letters, numbers, and underscores" >&2
            exit 1
            ;;
        esac
        case "$${MYSQL_USERNAME}" in
          ""|[Rr][Oo][Oo][Tt]|*[!A-Za-z0-9_]*)
            echo "MYSQL_USERNAME must be a non-root alphanumeric app user" >&2
            exit 1
            ;;
        esac
        case "$${MYSQL_PASSWORD}" in
          *[!A-Za-z0-9_+./=~-]*)
            echo "MYSQL_PASSWORD must use URL/base64-safe characters" >&2
            exit 1
            ;;
        esac
        test "$${#MYSQL_PASSWORD}" -ge 16 || {
          echo "MYSQL_PASSWORD must be at least 16 characters" >&2
          exit 1
        }
        MYSQL_PWD="$${MYSQL_ROOT_PASSWORD}" mysql --protocol=TCP -h mysql -uroot <<SQL
        CREATE USER IF NOT EXISTS '$${MYSQL_USERNAME}'@'%' IDENTIFIED BY '$${MYSQL_PASSWORD}';
        ALTER USER '$${MYSQL_USERNAME}'@'%' IDENTIFIED BY '$${MYSQL_PASSWORD}';
        REVOKE ALL PRIVILEGES, GRANT OPTION FROM '$${MYSQL_USERNAME}'@'%';
        GRANT SELECT, INSERT, UPDATE, DELETE ON $${MYSQL_DATABASE}.* TO '$${MYSQL_USERNAME}'@'%';
        FLUSH PRIVILEGES;
        SQL
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required in production}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required in production}
      MYSQL_USERNAME: ${MYSQL_USERNAME:?MYSQL_USERNAME is required in production}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in production}
    networks:
      - neogul-map-network

  api-server:
    image: ${API_SERVER_IMAGE:?API_SERVER_IMAGE is required in production}
    environment:
      # Keep prod last so its logging, SQL-init, and error-detail hardening wins.
      SPRING_PROFILES_ACTIVE: mysql,s3,prod
      APP_COOKIE_SECURE: "true"
      APP_TEST_ENDPOINTS_ENABLED: "false"
      MYSQL_DDL_AUTO: none
      MYSQL_SQL_INIT_MODE: never
      MYSQL_SHOW_SQL: "false"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required in production}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required in production}
      MYSQL_USERNAME: ${MYSQL_USERNAME:?MYSQL_USERNAME is required in production}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required in production}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET is required in production}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:?KAKAO_CLIENT_ID is required in production}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:?KAKAO_CLIENT_SECRET is required in production}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:?NAVER_CLIENT_ID is required in production}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:?NAVER_CLIENT_SECRET is required in production}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:?APPLE_CLIENT_ID is required in production}
      APPLE_REVOCATION_ENABLED: "true"
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:?APPLE_TEAM_ID is required in production}
      APPLE_KEY_ID: ${APPLE_KEY_ID:?APPLE_KEY_ID is required in production}
      APPLE_PRIVATE_KEY_BASE64: ${APPLE_PRIVATE_KEY_BASE64:?APPLE_PRIVATE_KEY_BASE64 is required in production}
      APPLE_TOKEN_ENCRYPTION_KEY: ${APPLE_TOKEN_ENCRYPTION_KEY:?APPLE_TOKEN_ENCRYPTION_KEY is required in production}
      APP_OAUTH_MOBILE_CODE_REQUIRED: "true"
      APP_SECURITY_CSRF_ENABLED: "true"
      APP_SECURITY_SENSITIVE_RATE_LIMIT_ENABLED: "true"
      APP_SECURITY_SENSITIVE_RATE_LIMIT_REQUESTS_PER_WINDOW: "30"
      APP_SECURITY_SENSITIVE_RATE_LIMIT_WINDOW_SECONDS: "60"
      APP_SECURITY_SENSITIVE_RATE_LIMIT_MAX_TRACKED_CLIENTS: "10000"
      APP_CORS_ALLOWED_ORIGINS: https://nugulmap.com,https://www.nugulmap.com
      FRONTEND_URL: https://nugulmap.com
      OAUTH2_SUCCESS_REDIRECT_URL: https://nugulmap.com
      OAUTH2_FAILURE_REDIRECT_URL: https://nugulmap.com/login?error=oauth_failed
      MODERATION_OPERATOR_KEY: ${MODERATION_OPERATOR_KEY:?MODERATION_OPERATOR_KEY is required in production}
      SEOUL_CITYDATA_API_KEY: ${SEOUL_CITYDATA_API_KEY:?SEOUL_CITYDATA_API_KEY is required for live crowd data}
      SEOUL_CULTURE_API_KEY: ${SEOUL_CULTURE_API_KEY:?SEOUL_CULTURE_API_KEY is required for public Seongsu popup data}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required in production}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required in production}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:?AWS_S3_BUCKET is required in production}
    depends_on:
      mysql-app-init:
        condition: service_completed_successfully

  popup-trend-collector:
    environment:
      SEOUL_CULTURE_API_KEY: ${SEOUL_CULTURE_API_KEY:?SEOUL_CULTURE_API_KEY is required for public Seongsu popup data}
      POPUP_TRENDS_MIN_RECORDS: "0"
      POPUP_TRENDS_ALLOW_SAMPLE_FALLBACK: "false"
      POPUP_TRENDS_ALLOW_MANUAL_FALLBACK: "false"
